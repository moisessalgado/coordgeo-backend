[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py *_test.py tests.py
addopts = -ra

testpaths =
    api
    accounts
    organizations
    projects
    data
    permissions
    core
    tests_pytest

markers =
    unit: Testes unitários puros (funções, modelos, utilidades)
    api: Testes de endpoints de API REST
    integration: Testes de integração entre componentes
    slow: Testes que levam tempo significativo para executar
